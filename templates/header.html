<script>
    // 페이지 로딩 전 실행
    $(document).ready(function() {
        //로그인 확인
        $.ajax({
            type: "GET",
            url: "/api/session",
            data: {},
            success: function(response) {
                //로그인 상태면 True
                if(response['logged_in']) {
                    //네비게이션 로그인/로그아웃 변경
                    $('#loginButton').text('로그아웃');

                    //로그아웃 api 요청
                    $('#loginButton').on('click', function(e) {
                        e.preventDefault(); // 새로고침 방지
                        //로그아웃 API 요청
                        $.ajax({
                            type: "GET",
                            url: "user/api/logout",
                            data: {},
                            success: function(response) {
                                alert(response['msg']);
                                window.location.href = '/';
                            }
                        });
                    });
                    
                    //닉네임 표시
                    $('#mainNickname').text(response['nickname']);
                    
                    //동적 생성되는 마이페이지로 가는 링크 
                    //주소는 /user/<id>
                    $('#mainMyPage').attr('href', '/user/' + response['id'])

                    //프로필 이미지 DB요청
                    $.ajax({
                        type: "GET",
                        url: "/api/getUserImg",
                        data: {},
                        success: function(response) {
                            if (response['msg'] == success)
                                $('#mainProfileImg').attr("src", response['img']);
                        }
                    });

                }
            }
        });

        
    });
</script>
