<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" , initial-scale=1.0 />

    <title>BaseBullBBaDDa | 선수리스트</title>
    
    <style>
        .wrapper {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 1rem;
            padding: 1rem;
        }
        .card {
            flex: 0 0 auto;
            width: 13rem;
        }
    </style>

   <script src="https://code.jquery.com/jquery-3.5.1.min.js"
		  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
		  crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../static/css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
       
</head>

<body>
    <!-- 컨테이너 -->
    <div class="container">
        
        <!-- 로고 / 네비게이션 헤더 -->
        {% include "./header.html" %}
        <br>

        <!-- 한화 리스트
        <div class="wrapper">
            <div class="card">
                <img src="https://via.placeholder.com/200x120" class="card-img-top" alt="...">
                <div class="card-body">
                    <h5 class="card-title">Card 1</h5>
                    <p class="card-text">내용입니다.</p>
                    <a href="#" class="btn btn-primary">Go</a>
                </div>
            </div>
        </div> -->

        <nav>
            <div class="nav nav-tabs" id="nav-tab" role="tablist">
                <button class="nav-link" id="KIA_TIGERS-tab" data-toggle="tab" data-target="#KIA_TIGERS_Players" type="button" role="tab" aria-controls="nav-profile" aria-selected="true">KIA 타이거즈</button>
                <button class="nav-link" id="SAMSUNG_LIONS-tab" data-toggle="tab" data-target="#SAMSUNG_LIONS_Players" type="button" role="tab" aria-controls="nav-contact" aria-selected="false">삼성 라이온즈</button>
                <button class="nav-link" id="LG_TWINS-tab" data-toggle="tab" data-target="#LG_TWINS_Players" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">LG 트윈스</button>
                <button class="nav-link" id="DOOSAN_BEARS-tab" data-toggle="tab" data-target="#DOOSAN_BEARS_Players" type="button" role="tab" aria-controls="nav-contact" aria-selected="false">두산 베어스</button>
                <button class="nav-link" id="KT_WIZ-tab" data-toggle="tab" data-target="#KT_WIZ_Players" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">KT 위즈</button>
                <button class="nav-link" id="SSG_LANDERS-tab" data-toggle="tab" data-target="#SSG_LANDERS_Players" type="button" role="tab" aria-controls="nav-contact" aria-selected="false">SSG 랜더스</button>
                <button class="nav-link" id="LOTTE_GIANTS-tab" data-toggle="tab" data-target="#LOTTE_GIANTS_Players" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">롯데 자이언츠</button>
                <button class="nav-link" id="HANWHA_EAGLES-tab" data-toggle="tab" data-target="#HANWHA_EAGLES_Players" type="button" role="tab" aria-controls="nav-contact" aria-selected="false">한화 이글스</button>
                <button class="nav-link" id="NC_DINOS-tab" data-toggle="tab" data-target="#NC_DINOS_Players" type="button" role="tab" aria-controls="nav-profile" aria-selected="false">NC 다이노스</button>
                <button class="nav-link" id="KIWOOM_HEROS-tab" data-toggle="tab" data-target="#KIWOOM_HEROS_Players" type="button" role="tab" aria-controls="nav-contact" aria-selected="false">키움 히어로즈</button>
            </div>
        </nav>
        <br>
        
        <div class="tab-content" id="nav-tabContent">
            <div class="tab-pane fade" id="KIA_TIGERS_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="KIA_TIGERS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="SAMSUNG_LIONS_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="SAMSUNG_LIONS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="LG_TWINS_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="LG_TWINS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="DOOSAN_BEARS_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="DOOSAN_BEARS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="KT_WIZ_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="KT_WIZ" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="SSG_LANDERS_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="SSG_LANDERS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="HANWHA_EAGLES_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="HANWHA_EAGLES" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="LOTTE_GIANTS_Players" role="tabpanel" aria-labelledby="nav-profile-tab"><div id="LOTTE_GIANTS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="NC_DINOS_Players" role="tabpanel" aria-labelledby="nav-contact-tab"><div id="NC_DINOS" class="row row-cols-1 row-cols-md-4"></div></div>
            <div class="tab-pane fade" id="KIWOOM_HEROS_Players" role="tabpanel" aria-labelledby="nav-contact-tab"><div id="KIWOOM_HEROS" class="row row-cols-1 row-cols-md-4"></div></div>
        </div>

    </div> <!-- 컨테이너 끝-->

    <script>
        //이벤트 리스너 중 하나인'shown.bs.tab'에 반응해서 함수를 실행
        $('button[data-toggle="tab"]').on('shown.bs.tab', function (e) {
            const activeTab = $('.nav-link.active').attr('id'); // "KIA_TIGERS-tab"
            const team_id = activeTab.replace('-tab', ''); // "KIA_TIGERS"
            loadPlayers(team_id);
        });

        function loadPlayers(teamName){
            $.ajax({
                type: "GET",
                url: `/players/api/${teamName}`,
                data: {},
                success: function(response){
                    $(`#${teamName}`).empty();

                    for (let i = 0; i < response.length; i++){
                        let player = response[i];
                        let url = `team/${teamName}/playerId=${player.playerId}`;

                        let html = `<div class="col mb-4">
                                        <div class="card h-100">
                                            <a href="${url}" class="text-decoration-none text-dark">
                                                <img src="${player.img}" class="card-img-top" alt="${player.name}" loading="lazy">
                                                <div class="card-body">
                                                    <h5 class="card-title">${player.name}</h5>
                                                </div>
                                            </a>
                                        </div>
                                    </div>`;
                        $(`#${teamName}`).append(html);
                    }
                },
                error: function() {
                    alert('선수를 불러오지 못했습니다.');
                }
            });
        }
    </script>
</body>
