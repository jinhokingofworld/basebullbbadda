<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
		  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
		  crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../static/css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    
</head>
<body>
    <!-- 컨테이너 -->
    <div class="container">
    
        <!-- 로고 이미지와 프로필 사진, 닉네임 -->
        <div class="mainTitle">
            <a href="/"><div class="mainLogo">
                <!-- <img rel="logoImg" src="#"> -->
            </div></a>
            <div class="mainProfile">
                <a href="/user/login"><img id="mainProfileImg" src="https://i.namu.wiki/i/HWL5tg8hqagW8dHBBJMbOoYdEGvyQAkbki_50A0NUXHaluRcIYWcJfnMVWN9xWM3bDb1-8NbirkdubZ3niZcWhOqGFOESg2RClcEeJcvjaB3fSZY324Yi8_9yXYfL1eRZ5xRZP4ucYxLGAxi0DKX_A.webp" /></a>
                <p id="mainNickname"></p>
            </div>
        </div>

        <!-- 네비게이션 -->
        <div class="border border-primary rounded">
            <ul class="nav nav-pills nav-justified">
                <li class="nav-item dropdown border-right border-primary">
                    <a class="nav-link dropdown-toggle" data-toggle="dropdown" href="#" role="button" aria-expanded="true">팀</a>
                    <div class="dropdown-menu">
                        <a class="dropdown-item" href="/team/Tigers">KIA 타이거즈</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Lions">삼성 라이온즈</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Twins">LG 트윈스</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Bears">두산 베어스</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Wiz">Kt wiz</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Landers">SSG 랜더스</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Giants">롯데 자이언츠</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Eagles">한화 이글스</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Dinos">NC 다이노스</a>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="/team/Heros">키움 히어로즈</a>
                    </div>
                </li>
                <li class="nav-item border-right border-primary">
                    <a class="nav-link" href="/player" >선수</a>
                </li>
                <li class="nav-item">
                    <a id="loginButton" class="nav-link" href="/user/login">로그인</a>
                </li>
            </ul>
        </div>
        
        <br>
        <!-- 페이지 소개 -->
        <div class="jumbotron jumbotron-fluid">
            <div class="container">
                <h1 class="display-4">베이스불빠따에 오신걸 환영합니다.</h1>
                <p class="lead">다양한 야구 정보를 한 눈에 볼 수 있게 모아놓은 야구 정보 홈페이지입니다.</p>
                <p class="lead">좋은하루되세요~</p>
            </div>
        </div>

        <br>
        <!-- 웹 스크랩핑 결과 표시 -->
        <div>
            <table class="table">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">순위</th>
                        <th scope="col">팀명</th>
                        <th scope="col">경기</th>
                        <th scope="col">승</th>
                        <th scope="col">패</th>
                        <th scope="col">무</th>
                        <th scope="col">승률</th>
                    </tr>
                </thead>
                <tbody id="rankingTable">
                    <!-- 여기에 <tr>동적 생성 -->
                </tbody>
            </table>
        </div>

    </div><!-- 컨테이너 끝 -->

    <script>
        $(document).ready(function() {
            //로그인 확인
            $.ajax({
                type: "GET",
                url: "/api/session",
                data: {},
                success: function(response) {
                    if(response['logged_in']) {
                        //로그인이면 네비게이션 로그인/로그아웃 변경
                        $('#loginButton').attr('href', '/user/logout');
                        $('#loginButton').text('로그아웃');
                        $('#mainNickname').text(response['id']);

                    }
                }
            });

            

            //닉네임 DB요청
            $.ajax({
                type: "GET",
                url: "api/getUserNickname",
                data: {},
                success: function(response) {
                    $('#mainNickname').val(response);
                }
            });
        });

        //로그아웃 API 요청
        $.ajax({
            type: "GET",
            url: "user/api/logout",
            data: {},
            success: function() {
                console.log('logout success');
                window.location.href = '/';
            }
        });

        //팀 순위 정보 API 요청
        $.ajax({
            type: "GET",
            url: "/api/ranking",
            data: {},
            success: function(response){
                let ranks = response;
                //받은 api로 테이블 동적 생성
                for (let i = 0; ranks.length; i++) {
                    makeTable(
                        ranks[i]["순위"],
                        ranks[i]["팀명"],
                        ranks[i]["경기"],
                        ranks[i]["승"],
                        ranks[i]["패"],
                        ranks[i]["무"],
                        ranks[i]["승률"]
                    );
                }
            }
        });

        //API이용 테이블 생성
        function makeTable(rank, name, games, win, lose, draw, winrate) {
            html = `
                <tr>
                <th scope="row">${rank}</th>
                <td>${name}</td>
                <td>${games}</td>
                <td>${win}</td>
                <td>${lose}</td>
                <td>${draw}</td>
                <td>${winrate}</td>
                </tr>
            `
            $("#rankingTable").append(html);
        }
    </script>
</body>
