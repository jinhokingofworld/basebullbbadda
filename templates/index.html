<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
		  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
		  crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

</head>
<body>
    <!-- 컨테이너 -->
    <div class="container">
        
        <!-- 로고 / 네비게이션 헤더 -->
        {% include "./header.html" %}
        <br>

        <!-- 페이지 소개 -->
        <div class="jumbotron jumbotron-fluid">
            <div class="container1">
                <h1 class="display-4">베이스불빠따에 오신걸 환영합니다.</h1>
                <p class="lead">지금 가장 핫한 KBO 정보를 한자리에!</p>
                <p class="lead">팀, 선수, 뉴스, 영상까지 모두 담은 팬을 위한 종합 플랫폼입니다.</p>
            </div>
        </div>

        <br>
        <!-- 웹 스크랩핑 결과 표시 -->
        
        <div>
            <h2 style="text-align: center;"> KBO 리그 순위 </h2>
            <table class="table">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">순위</th>
                        <th scope="col">팀명</th>
                        <th scope="col">경기</th>
                        <th scope="col">승</th>
                        <th scope="col">패</th>
                        <th scope="col">무</th>
                        <th scope="col">승률</th>
                    </tr>
                </thead>
                <tbody id="rankingTable">
                    <!-- 여기에 <tr>동적 생성 -->
                </tbody>
            </table>
        </div>

    </div><!-- 컨테이너 끝 -->

    <!-- JS 시작 -->
    <script>

        //팀 순위 정보 API 요청
        $.ajax({
            type: "GET",
            url: "/api/ranking",
            data: {},
            success: function(response){
                let ranks = response;
                //받은 api로 테이블 동적 생성
                for (let i = 0; ranks['list'].length; i++) {
                    makeTable(
                        ranks['list'][i]["순위"],
                        ranks['list'][i]["팀명"],
                        ranks['list'][i]["경기"],
                        ranks['list'][i]["승"],
                        ranks['list'][i]["패"],
                        ranks['list'][i]["무"],
                        ranks['list'][i]["승률"]
                    );
                }
                $("#rankingTable").append(html);
            }
        });

        //API이용 테이블 생성
        function makeTable(rank, name, games, win, lose, draw, winrate) {
            html = `
                <tr>
                <th scope="row">${rank}</th>
                <td>${name}</td>
                <td>${games}</td>
                <td>${win}</td>
                <td>${lose}</td>
                <td>${draw}</td>
                <td>${winrate}</td>
                </tr>
            `
            $("#rankingTable").append(html);
        }
    </script>
</body>
