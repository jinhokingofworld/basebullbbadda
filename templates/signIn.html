<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 크래프톤 정글 | 회원가입 </title>

    <!-- 이 부분은 부트스트랩을 불러오기 위한 코드입니다. : Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <!-- 이 부분은 부트스트랩을 불러오는 코드입니다. -->
    


    <!-- 이 부분은 index.css를 불러오는 코드입니다.-->
    <link rel="stylesheet" href="../static/css/index.css">
    />
    <!-- 이 부분은 index.css를 불러오는 코드입니다.-->

</head>
<body>

     <!-- 이 부분은 jQuery와 bootstrap 번들 코드로 자바스크립트 코드를 임포트 합니다. . -->
    <script
		  src="https://code.jquery.com/jquery-3.5.1.min.js"
		  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
		  crossorigin="anonymous"
		></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
      crossorigin="anonymous"
    ></script>
    <!-- jQuery와 Bootstrap 번들 코드로 자바스크립트 코드입니다.-->

<div class = "wrap">
    <div class = "container">
        <div class = "userInput">
            <!-- 아이디 입력 -->
            <h4 class="list">아이디<span id="idError"></span></h4>
            <span class="box int_id" ><input type="text" id="id" class="int check"
                maxlength="20"></span>
        </div>
        
        <div class="userInput">
            <!-- 비밀번호 입력 -->
            <h4 class="list">비밀번호<span id="pwError"></span></h4>
            <span class="box int_id"><input type="password" id="pw" class="int check"
                maxlength="20"></span>
        </div>
            <!-- 비밀번호 재확인 입력 -->
        <div class="userInput">
            <h4 class="list">비밀번호 재확인<span id="pwCheckError"></span></h4>
            <span class="box int_id"><input type="password" id="pwCheck" class="int check" 
                maxlength="20"></span>
        </div>
            <!-- 닉네임 입력 -->
        <div class="userInput">
            <h4 class="list">닉네임<span id="nicknameError"></span></h4>
            <span class="box int_id"><input type="text" id="nickname" class="int check"
                maxlength="20"></span>
        </div>
        
        <button onclick="CheckId()" class="btn btn-primary btn-lg" type="button">확인</button>
        
    </div>
</div>


<script>

    
    // 회원가입 함수
    function CheckId() {

        
            let dataID= $('#id').val();
            let dataPW= $('#pw').val();
            let dataNickname = $('#nickname').val();
            let dataPWchk = $('#pwCheck').val();

            if(dataID== "" || dataPW==""){
                alert("아이디와 비밀번호를 입력하세요.");
                return 
            }
            
            console.log(dataPW,dataPWchk)
            if(dataPWchk !=  dataPW ) {
                alert(" 패스워드가 일치하지 않습니다. ");    
                return 
            }

        $.ajax({
        type: "POST",
        url: `/user/api/signin`,
        data: {id: dataID, pw: dataPW, nickname: dataNickname},
        success: function (response) {
            alert(response['nickname'] + '님 환영합니다.')
        }
    });

}

</script>
    



</body>
</html>
