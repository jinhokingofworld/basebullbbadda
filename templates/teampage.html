<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" , initial-scale=1.0 />


<!-- 이 부분은 부트스트랩을 불러오기 위한 코드입니다. : Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <title>팀페이지 제작 html</title>

 <!-- 이 부분은 index.css를 불러오는 코드입니다.-->
    <link rel="stylesheet" href="../static/css/index.css">
    <!-- 이 부분은 index.css를 불러오는 코드입니다.-->

    <style>
        body{
            padding: 20px;
        }

        .team-section{
            display:flex;
            border: 2px solid black;
            padding: 20px;
            margin-bottom: 30px;
        }
        .team-section img{
            width: 200px;
            height: 200px;
            margin-right: 30px;
        }
        .card-section{
            display: flex;
            margin-right: 10px;
            margin-left: 10px;

        }
        .card-box{
            border: 2px solid black;
            width: 50%;
            height: 200px;
            padding: 10px;
            margin: 10px;
        }
        .schedule-box,
        .community-box {
            border:2px solid black;
            height: 150px;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>


       <!-- 이 부분은 jQuery와 bootstrap 번들 코드로 자바스크립트 코드를 임포트 합니다. . -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
        integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>

</head>

<body>

    

  



    <div class ="container">


        <div class="team-section">
            <img src=".." alt="팀이미지">
            <div class="team-info">
                <h4 id="team-name">팀 이름</h4>
                <p id="team-detail">연고지 / 감독 / 주장 / 우승횟수 / 홈피링크</p>
            </div>
        </div>

        <div class="card-section">
            <div class="card-box" id="article-box">기사</div>
            <div class="card-box" id="trend-box">최근 전적 / 최근 동향 </div>
        </div>

        <!-- <div class="로그인시 보이는 클래스 삽입 "> </div> -->
        <div class="schedule-box" id="schedule-box">경기 일정</div>
        
        <div class="community-box" id="community">
            <!-- <img src = "프로필사진">댓글 프로필이 들어갈 부분></img>
             <p class="아이디"> 댓글아이디가 들어갈 부분 </p> -->
            <p><span class = "date" > 날짜가 들어갈 부분</span></p>
            <p><textarea class = "comment-box" id ="comment_content"></textarea></p>
            <button onclick =postComment() class=" btn btn-primary btnComment" id="comment_button" type="button">등록</button>
        </div>

    </div>

    <script>
    function postComment() {
         let dataComment = $('#comment_content').val();

            if(dataComment== ""){
                alert("내용을 입력하세요.");
                return 
            }

         // 댓글 작성 api 요청하는 부분
        $.ajax({
        type: "POST",
        url: `/team/api/comment`,
        data: {comment: dataComment},
        success: function (response) {
            if(response['result'] == 'success') {
                alert(response['msg'])
                // 팀페이지로 리디렉션 (제자리 리디렉션)
                window.location.href = response['url'];
            }
            else{
                alert(response['msg'])
            }
        }
    });

    }
    </script>


</body>
    

</html>
