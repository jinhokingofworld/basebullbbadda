<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseBullBbaDda | MyPage</title>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
		  integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
		  crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <!-- 헤더 불러오기 -->
        {%include'./header.html'%}
        <br>

        <!-- 마이페이지 -->
        <div class="myPageBack">
            <h1>{{session.get('nickname')}} 님의 마이페이지입니다.</h1>
            <br>

            <!-- 즐겨찾기 -->
            <h2>즐겨찾기</h2>
            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="즐겨찾기할 기사의 URL을 입력하세요" id="inputURL">
                <div class="input-group-append">
                    <button class="btn btn-secondary" type="button" id="button-addon2" onclick="takeURL()">기사 등록</button>
                </div>
            </div>
            <div class="all">
                <div id='likeList' class="list-group"
                    style="width: 100%; max-height: 300px; overflow: scroll; display: inline-block; ">
                    <!-- 즐겨찾기 기사가 불러와지는 곳 -->
                </div>
            </div>
            <br>

            <!-- 좋아하는 선수 수정 -->
             <h2>좋아하는 팀 등록</h2>
             <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="좋아하는 선수의 이름을 입력하세요" id="pickTeam">
                <div class="input-group-append">
                    <button class="btn btn-secondary" type="button" id="button-addon2" onclick="pickMyTeam()">팀 등록</button>
                </div>
            </div>
            <br>

            <!-- 닉네임 수정 -->
             <h2>닉네임 수정</h2>
             <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="변경할 닉네임을 입력하세요" id="changeNick">
                <div class="input-group-append">
                    <button class="btn btn-secondary" type="button" id="button-addon2" onclick="updateNick()">별명 수정</button>
                </div>
            </div>
            <br>

            <!-- 회원 탈퇴 -->
             <h2>회원 탈퇴</h2>
             <div class="input-group mb-3">
                <input type="text" class="form-control bg-danger text-white placeholder" placeholder="아이디를 입력하세요"  id="delUser">
                <div class="input-group-append">
                    <button class="btn btn-danger" type="button" id="button-addon2" onclick="deleteUser()">회원 탈퇴</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        
        $(document).ready(function() {
            //페이지 로딩 중 로그인 확인
            $.ajax({
                type: "GET",
                url: "/api/session",
                data: {},
                success: function(response){
                    //로그인이 아니면 alert후 메인페이지로 이동
                    if (!response['logged_in']){
                        alert('잘못된 접근입니다.');
                        window.location.href = '/'
                    };

                    //좋아하는 기사 로딩 요청
                    $.ajax({
                        type: "GET",
                        url: "/user/api/getLikes",
                        data: {},
                        success: function(response){
                            response['likes'].forEach( like => {
                                title = like['title']
                                url = like['url']
                                img = like['img']
                                description = like['description']

                                temp_html = `<a href="${url}" class="list-group-item list-group-item-action">
                                            <div>
                                                <img src="${img}"></img>
                                                <div class="d-flex w-100 justify-content-between">
                                                    <h5 class="mb-1">${title}</h5>
                                                </div>
                                                <p class="mb-1">${description}</p>
                                            </div>
                                        </a>`;

                                html =  `<div class="media">
                                            <img src="..." class="mr-3" alt="...">
                                            <div class="media-body">
                                                <h5 class="mt-0">Media heading</h5>
                                                <p>Will you do the same for me? It's time to face the music I'm no longer your muse. Heard it's beautiful, be the judge and my girls gonna take a vote. I can feel a phoenix inside of me. Heaven is jealous of our love, angels are crying from up above. Yeah, you take me to utopia.</p>
                                            </div>
                                        </div>`;

                                $(".list-group").append(temp_html);
                            });

                        },
                        error: function() {
                            alert('즐겨찾기 로딩에 실패했습니다.');
                        }
                    });
                }
            });
        });

        //좋아하는 기사 DB저장요청
        function takeURL() {
            let input = $('#inputURL').val();
            $.ajax({
                type: "POST",
                url: "/user/api/likes",
                data: {'URL' : input},
                success: function(response){
                    alert(response['msg'])
                },
                error: function() {
                    alert('에러가 발생했습니다.');
                }
            });
        }
        
        //좋아하는 팀 등록
        function pickMyTeam() {
            let input = $('#pickTeam').val();
            $.ajax({
                type: "POST",
                url: "/user/api/idol",
                data: {'idol' : input},
                success: function(response){
                    alert(response['msg'])
                },
                error: function() {
                    alert('에러가 발생했습니다.');
                }
            });
        }

        //닉네임 변경
        function updateNick() {
            let input = $('#changeNick').val();
            $.ajax({
                type: "POST",
                url: "/user/api/updateNick",
                data: { 'newNick' : input },
                success: function(response){
                        alert('닉네임이 ' + response['nickname'] +'으로 변경되었습니다.');
                },
                error: function(){
                    alert('오류가 발생했습니다.');
                }
            });
        }

        //회원탈퇴
        function deleteUser() {
            let input = $('#delUser').val();

            //세션 정보 요청
            $.ajax({
                type: "GET",
                url: "/api/session",
                data: {},
                success: function(response){
                    //입력한 값이 맞으면
                    if ( input == response['id']){
                        //DB에 계정 삭제요청
                        $.ajax({
                            type: "POST",
                            url: "/user/api/delete",
                            data: {'id' : input},
                            success: function(response){
                                //아이디 삭제 완료
                                alert(response['msg']);
                                window.location.href = '/';
                            },
                            error: function(XHR) {
                                alert('오류가 발생했습니다.');
                                window.location.href = '/';
                            }
                        });       
                    }
                },
            });
        }
            
    </script>
</body>
</html>
